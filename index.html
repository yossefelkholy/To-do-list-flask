<!DOCTYPE html>
<html lang="ar">
<head>
    <title>To-Do List</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>My To-Do List</h1>
    <form method="POST">
        <input type="text" name="task" placeholder="اكتب مهمة هنا" required>
        <button type="submit">Add</button>
    </form>
    <ul>
        {% for task in tasks %}
        <li>
            {{ task }}
            <a href="/delete/{{ loop.index0 }}">
                <button type="button">X</button>
            </a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
